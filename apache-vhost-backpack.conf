# /etc/httpd/conf.d/backpack.infraestructuragis.com.conf
# Apache VirtualHost para el servidor de mochila de insignias
# Fedora Server 42 + httpd
# Requisitos: mod_proxy, mod_proxy_http, mod_headers, mod_rewrite, mod_ssl

# ── HTTP → HTTPS ──────────────────────────────────────────────────────────────
<VirtualHost *:80>
    ServerName  backpack.infraestructuragis.com
    ServerAdmin sgonzalez@infraestructuragis.com
    Redirect permanent / https://backpack.infraestructuragis.com/
    ErrorLog  /var/log/httpd/backpack-error.log
    CustomLog /var/log/httpd/backpack-access.log combined
</VirtualHost>

# ── HTTPS ─────────────────────────────────────────────────────────────────────
<VirtualHost *:443>
    ServerName  backpack.infraestructuragis.com
    ServerAdmin sgonzalez@infraestructuragis.com

    # SSL — certbot completa estas líneas automáticamente con:
    #   sudo certbot --apache -d backpack.infraestructuragis.com
    # SSLEngine on
    # SSLCertificateFile    /etc/letsencrypt/live/backpack.infraestructuragis.com/fullchain.pem
    # SSLCertificateKeyFile /etc/letsencrypt/live/backpack.infraestructuragis.com/privkey.pem
    # Include /etc/letsencrypt/options-ssl-apache.conf

    # ── Proxy → Node.js ───────────────────────────────────────────────────────
    # Si cambias el puerto en .env, actualiza también aquí
    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:3600/
    ProxyPassReverse / http://127.0.0.1:3600/

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port  "443"
    ProxyTimeout 300

    # WebSocket (para uso futuro)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*) ws://127.0.0.1:3600/$1 [P,L]

    # ── Logs ──────────────────────────────────────────────────────────────────
    ErrorLog  /var/log/httpd/backpack-ssl-error.log
    CustomLog /var/log/httpd/backpack-ssl-access.log combined

    # ── Security headers ──────────────────────────────────────────────────────
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Frame-Options            "SAMEORIGIN"
    Header always set X-Content-Type-Options     "nosniff"
</VirtualHost>

# ── NOTAS ─────────────────────────────────────────────────────────────────────
# 1. Instalar módulos si faltan:
#      sudo dnf install -y mod_ssl
#    (mod_proxy, mod_headers, mod_rewrite ya vienen con httpd en Fedora)
#
# 2. Verificar que los módulos están cargados:
#      sudo httpd -M | grep -E "proxy|ssl|headers|rewrite"
#
# 3. Verificar sintaxis antes de recargar:
#      sudo apachectl configtest
#
# 4. Obtener certificado SSL:
#      sudo dnf install -y certbot python3-certbot-apache
#      sudo certbot --apache -d backpack.infraestructuragis.com
#
# 5. SELinux (obligatorio en Fedora):
#      sudo setsebool -P httpd_can_network_connect 1
#
# 6. Recargar Apache:
#      sudo systemctl reload httpd
