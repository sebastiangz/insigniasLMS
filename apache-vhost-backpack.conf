# ─────────────────────────────────────────────────────────────────────────────
# /etc/httpd/conf.d/backpack.infraestructuragis.com.conf
# Apache VirtualHost para servidor de insignias LMS
# Fedora Server 42 + httpd
# ─────────────────────────────────────────────────────────────────────────────

# Redirigir HTTP a HTTPS
<VirtualHost *:80>
    ServerName backpack.infraestructuragis.com
    ServerAdmin sgonzalez@infraestructuragis.com

    # Redirigir todo a HTTPS
    Redirect permanent / https://backpack.infraestructuragis.com/
    
    # Logs
    ErrorLog /var/log/httpd/backpack-error.log
    CustomLog /var/log/httpd/backpack-access.log combined
</VirtualHost>

# VirtualHost HTTPS (configurado por certbot después)
<VirtualHost *:443>
    ServerName backpack.infraestructuragis.com
    ServerAdmin sgonzalez@infraestructuragis.com

    # Certificados SSL (certbot los configurará automáticamente)
    # SSLEngine on
    # SSLCertificateFile /etc/letsencrypt/live/backpack.infraestructuragis.com/fullchain.pem
    # SSLCertificateKeyFile /etc/letsencrypt/live/backpack.infraestructuragis.com/privkey.pem
    # Include /etc/letsencrypt/options-ssl-apache.conf

    # ── Proxy hacia Node.js ───────────────────────────────────────────────────
    # IMPORTANTE: Cambiar el puerto según el que detectó find-available-port.sh
    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:3100/
    ProxyPassReverse / http://127.0.0.1:3100/

    # Headers para que Node.js sepa que viene de HTTPS
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    # Timeout más largo para OAuth dance
    ProxyTimeout 300

    # WebSocket support (para futuras funcionalidades)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*)           ws://127.0.0.1:3100/$1 [P,L]
    RewriteCond %{HTTP:Upgrade} !=websocket [NC]
    RewriteRule /(.*)           http://127.0.0.1:3100/$1 [P,L]

    # ── Logs ───────────────────────────────────────────────────────────────────
    ErrorLog /var/log/httpd/backpack-ssl-error.log
    CustomLog /var/log/httpd/backpack-ssl-access.log combined

    # ── Security Headers ───────────────────────────────────────────────────────
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"
</VirtualHost>

# ─────────────────────────────────────────────────────────────────────────────
# NOTAS DE INSTALACIÓN:
#
# 1. Asegúrate de tener los módulos necesarios habilitados:
#    sudo dnf install -y mod_ssl mod_proxy mod_proxy_http mod_headers mod_rewrite
#
# 2. Verifica que los módulos estén cargados:
#    sudo httpd -M | grep -E "(proxy|ssl|headers|rewrite)"
#
# 3. Prueba la configuración:
#    sudo apachectl configtest
#
# 4. Obtener certificado SSL con certbot:
#    sudo dnf install -y certbot python3-certbot-apache
#    sudo certbot --apache -d backpack.infraestructuragis.com
#
# 5. Reiniciar Apache:
#    sudo systemctl reload httpd
#
# 6. Verificar logs:
#    sudo tail -f /var/log/httpd/backpack-*
# ─────────────────────────────────────────────────────────────────────────────
