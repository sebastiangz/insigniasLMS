# ═════════════════════════════════════════════════════════════════════════════
# docker-compose.yml
# Deployment con Docker Compose para Servidor Mochila Insignias LMS
# ═════════════════════════════════════════════════════════════════════════════

version: '3.8'

services:
  backpack:
    build:
      context: .
      dockerfile: Dockerfile
    image: backpack-lms:latest
    container_name: backpack-lms
    
    # Puerto interno del contenedor → puerto del host
    # Ajusta el puerto del host según tu configuración
    ports:
      - "3100:3100"
    
    # Variables de entorno (mejor usar archivo .env)
    environment:
      - NODE_ENV=production
      - PORT=3100
      - PUBLIC_URL=https://backpack.infraestructuragis.com
      - DB_PATH=/app/data/backpack.db
      - MOODLE_ORIGIN=https://educacioncontinua.ucol.mx
      - INSTITUTION_NAME=Universidad de Colima
      - DEPARTMENT_NAME=Educación Continua
      - ACCESS_TOKEN_TTL=3600
      - REFRESH_TOKEN_TTL=2592000
      - ALLOW_DYNAMIC_REGISTRATION=true
      # JWT_SECRET se pasa desde archivo .env (más seguro)
    
    # Archivo .env para variables sensibles
    env_file:
      - .env
    
    # Volúmenes para persistencia de datos
    volumes:
      # Base de datos SQLite
      - backpack-data:/app/data
      # Logs (opcional)
      - backpack-logs:/app/logs
    
    # Reinicio automático
    restart: unless-stopped
    
    # Límites de recursos
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Red
    networks:
      - backpack-network

# ── Volúmenes ────────────────────────────────────────────────────────────────
volumes:
  backpack-data:
    driver: local
  backpack-logs:
    driver: local

# ── Redes ────────────────────────────────────────────────────────────────────
networks:
  backpack-network:
    driver: bridge

# ═════════════════════════════════════════════════════════════════════════════
# COMANDOS ÚTILES:
#
# Construir e iniciar:
#   docker-compose up -d --build
#
# Ver logs:
#   docker-compose logs -f backpack
#
# Detener:
#   docker-compose down
#
# Detener y eliminar volúmenes (¡CUIDADO! borra la BD):
#   docker-compose down -v
#
# Reiniciar:
#   docker-compose restart backpack
#
# Ver estado:
#   docker-compose ps
#
# Ejecutar comandos dentro del contenedor:
#   docker-compose exec backpack sh
#
# Backup de la base de datos:
#   docker-compose exec backpack sqlite3 /app/data/backpack.db .dump > backup.sql
#
# Restaurar base de datos:
#   cat backup.sql | docker-compose exec -T backpack sqlite3 /app/data/backpack.db
#
# ═════════════════════════════════════════════════════════════════════════════
